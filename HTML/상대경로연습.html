<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상대경로/title>
</head>
<body>
    <h1>  상대경로</h1>
    <ul>
        <li>./현재디렉토리</li>
        <li>생략 현재디렉토리</li>
        <li>../상위디렉토리</li>
        <li>/ 루트디렉토리(최상위디렉토리)</li>
        <li>경로1/경로2/파일명.확장 / --> 경로폴더아래</li>

    </ul>
    <hr>
    <h2>상대경로 연습</h2>
    <p>현재 작성중 html 문서의 위치 <br>
        최상위 아래html 폴더 아래 상대경로 연습.html <br>
        /html/상대경로연습.html 
    </p>
    <div>
        <pre>
            /
            ㄴ html
                ㄴasset
                    ㄴlogo.png
                ㄴ상대경로연습.html
        </pre>
    </div>
    <hr>
    
    <!-- img src="url" 
     alt="
     - 검색엔진 키워드
     - 이미지의 정보 텍스트 제공
     - 이미지 문제시 대체 텍스트
     - 이미지 정보력 없으면 빈문자">
     -->
     <!-- 
     현재 html 문서     /html/상대경로연습.html
     보여줄 이미지   /html/asset/logo.png -->
     <img src="logo.png" alt="이미지연습">
     <!-- 
     html 문서가 있는 폴더에서 logo.png 파일이 있는 asset 폴더로 이동해서 logo.png 파일을 찾아서 표시 -->
     <img src="./asset/logo.png" alt="이미지연습">
     <img src="/html/asset/logo.png" alt="이미지연습">
     

        

</body>
</html>
